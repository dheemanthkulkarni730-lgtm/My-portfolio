<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calorie Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>🔥 Calorie Calculator</h1>
    <p>Estimate Your Daily Calorie Needs</p>
</header>

<section>

<h2>Enter Your Details</h2>

<label>Age</label><br><br>
<input type="number" id="age" placeholder="Enter your age"><br><br>

<label>Gender</label><br><br>
<select id="gender">
<option value="male">Male</option>
<option value="female">Female</option>
</select><br><br>

<label>Height (cm)</label><br><br>
<input type="number" id="height" placeholder="Enter height"><br><br>

<label>Weight (kg)</label><br><br>
<input type="number" id="weight" placeholder="Enter weight"><br><br>

<label>Activity Level</label><br><br>

<select id="activity">
<option value="1.2">Sedentary (Little Exercise)</option>
<option value="1.375">Light Exercise (1-3 Days)</option>
<option value="1.55">Moderate Exercise (3-5 Days)</option>
<option value="1.725">Heavy Exercise (6-7 Days)</option>
<option value="1.9">Athlete (Very Heavy Exercise)</option>
</select>

<br><br>

<button onclick="calculateCalories()">Calculate Calories</button>

<h2 id="result"></h2>

</section>

<br>

<a href="workout.html">
<button>⬅ Back to Workout Hub</button>
</a>

<br><br>

<script>

function calculateCalories(){

let age = parseInt(document.getElementById("age").value);
let height = parseFloat(document.getElementById("height").value);
let weight = parseFloat(document.getElementById("weight").value);
let gender = document.getElementById("gender").value;
let activity = parseFloat(document.getElementById("activity").value);

let bmr;

if(gender === "male"){
bmr = 10 * weight + 6.25 * height - 5 * age + 5;
}else{
bmr = 10 * weight + 6.25 * height - 5 * age - 161;
}

let calories = bmr * activity;

document.getElementById("result").innerHTML =
"<strong>Your Daily Calories:</strong><br><br>" +
Math.round(calories) +
" kcal/day";

}

</script>

</body>
</html>
